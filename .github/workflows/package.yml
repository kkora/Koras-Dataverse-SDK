name: Prerelease packages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  prerelease:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore and build
        run: |
          dotnet restore Koras.Dataverse.slnx
          dotnet build Koras.Dataverse.slnx --configuration Release --no-restore

      - name: Pack CI prerelease (0.1.0-ci.<run>)
        run: >
          dotnet pack Koras.Dataverse.slnx --configuration Release --no-build
          --output artifacts/packages
          -p:VersionSuffix=ci.${{ github.run_number }}

      # Consume the just-packed packages the way a real project would (local feed via
      # tests/Koras.Dataverse.PackageTests/nuget.config). Includes the net48 consumer
      # proving the FetchXml netstandard2.0 asset (Dataverse plug-in scenario).
      - name: Package consumption tests
        run: |
          VERSION=0.1.0-ci.${{ github.run_number }}
          dotnet build tests/Koras.Dataverse.PackageTests/Consumer.FetchXml.Net48 -p:KorasPackageVersion=$VERSION
          dotnet build tests/Koras.Dataverse.PackageTests/Consumer.Core -p:KorasPackageVersion=$VERSION
          dotnet run --project tests/Koras.Dataverse.PackageTests/Consumer.Core --framework net8.0 --no-build -p:KorasPackageVersion=$VERSION
          dotnet run --project tests/Koras.Dataverse.PackageTests/Consumer.Core --framework net10.0 --no-build -p:KorasPackageVersion=$VERSION

      - name: Upload prerelease packages
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: prerelease-packages
          path: artifacts/packages/
          retention-days: 14
