name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the GitHub release
  id-token: write # OIDC token for NuGet.org Trusted Publishing

jobs:
  release:
    runs-on: ubuntu-latest
    environment: nuget-release # protected environment bound to the NuGet.org Trusted Publishing policy
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
        with:
          fetch-depth: 0

      - name: Set up .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Derive version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Restore, build, test
        run: |
          dotnet restore Koras.Dataverse.slnx
          dotnet build Koras.Dataverse.slnx --configuration Release --no-restore -p:Version=${{ steps.version.outputs.version }}
          dotnet test Koras.Dataverse.slnx --configuration Release --no-build

      - name: Pack
        run: >
          dotnet pack Koras.Dataverse.slnx --configuration Release --no-build
          --output artifacts/packages
          -p:Version=${{ steps.version.outputs.version }}

      # One CycloneDX SBOM per shipped package, attached to the GitHub release
      # (security checklist §7).
      - name: Generate SBOMs
        run: |
          dotnet tool install --global CycloneDX
          for project in Koras.Dataverse.Abstractions Koras.Dataverse.FetchXml Koras.Dataverse Koras.Dataverse.OpenTelemetry; do
            dotnet-CycloneDX "src/$project/$project.csproj" \
              -o artifacts/sbom \
              -fn "$project.${{ steps.version.outputs.version }}.cdx.json" \
              -F Json
          done

      # Trusted Publishing: exchanges the workflow's OIDC token for a short-lived
      # NuGet.org API key — no long-lived NUGET_API_KEY secret to manage.
      - name: NuGet login (Trusted Publishing)
        id: nuget-login
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1
        with:
          user: kora.kanchan

      - name: Publish to NuGet.org
        run: >
          dotnet nuget push "artifacts/packages/*.nupkg"
          --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Create GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          files: |
            artifacts/packages/*.nupkg
            artifacts/packages/*.snupkg
            artifacts/sbom/*.cdx.json
