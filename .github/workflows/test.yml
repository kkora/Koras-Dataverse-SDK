name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore
        run: dotnet restore Koras.Dataverse.slnx

      - name: Build
        run: dotnet build Koras.Dataverse.slnx --configuration Release --no-restore

      - name: Test with coverage
        run: >
          dotnet test Koras.Dataverse.slnx --configuration Release --no-build
          --collect "Code Coverage;Format=cobertura"
          --results-directory artifacts/test-results
          --logger "trx;LogFilePrefix=results"

      - name: Upload test results and coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: artifacts/test-results/
