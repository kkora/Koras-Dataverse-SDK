name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up .NET
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore
        run: dotnet restore Koras.Dataverse.slnx

      - name: Build
        run: dotnet build Koras.Dataverse.slnx --configuration Release --no-restore

      - name: Test with coverage
        run: >
          dotnet test Koras.Dataverse.slnx --configuration Release --no-build
          --collect "XPlat Code Coverage"
          --results-directory artifacts/test-results
          --logger "trx;LogFilePrefix=results"

      # Coverage gate per docs/planning/master-plan.md §6: ≥ 80 % line / ≥ 70 % branch
      # on Koras.Dataverse + Koras.Dataverse.FetchXml (ratchet — do not lower).
      - name: Coverage gate (≥80% line / ≥70% branch)
        run: |
          dotnet tool install -g dotnet-reportgenerator-globaltool
          reportgenerator \
            -reports:"artifacts/test-results/**/coverage.cobertura.xml" \
            -targetdir:artifacts/test-results/coverage-report \
            "-reporttypes:JsonSummary;TextSummary;MarkdownSummaryGithub" \
            "-assemblyfilters:+Koras.Dataverse;+Koras.Dataverse.FetchXml"
          cat artifacts/test-results/coverage-report/Summary.txt
          cat artifacts/test-results/coverage-report/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY" || true
          LINE=$(jq -r '.summary.linecoverage' artifacts/test-results/coverage-report/Summary.json)
          BRANCH=$(jq -r '.summary.branchcoverage' artifacts/test-results/coverage-report/Summary.json)
          echo "line=$LINE% (gate 80%), branch=$BRANCH% (gate 70%)"
          awk -v l="$LINE" -v b="$BRANCH" 'BEGIN { exit !(l >= 80 && b >= 70) }' \
            || { echo "::error::Coverage below gate: line $LINE% (need 80%), branch $BRANCH% (need 70%)"; exit 1; }

      - name: Upload test results and coverage
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: test-results
          path: artifacts/test-results/
