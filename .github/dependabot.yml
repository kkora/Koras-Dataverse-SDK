version: 2
updates:
  - package-ecosystem: nuget
    directory: "/"
    schedule:
      interval: weekly
    groups:
      microsoft-extensions:
        patterns: ["Microsoft.Extensions.*"]
      azure:
        patterns: ["Azure.*"]
      test-tooling:
        patterns: ["xunit*", "NSubstitute", "coverlet*", "Microsoft.NET.Test.Sdk", "NetArchTest*", "BenchmarkDotNet"]
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
