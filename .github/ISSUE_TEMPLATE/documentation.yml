name: 📚 Documentation issue
description: Missing, unclear, or incorrect documentation.
labels: [documentation, triage]
body:
  - type: input
    id: page
    attributes:
      label: Page or file
      placeholder: docs/getting-started/quick-start.md
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What is wrong or missing?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
