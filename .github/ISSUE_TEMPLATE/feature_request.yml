name: 💡 Feature request
description: Propose a new capability or API improvement.
labels: [enhancement, triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What Dataverse task is painful or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed API or behavior
      description: Sketch the code you would like to write.
      render: csharp
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I checked the roadmap (ROADMAP.md) and the out-of-scope list.
          required: true
